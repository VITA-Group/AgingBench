sut_id: llama3_oracle_retrieval
description: "Llama-3.1-8B oracle_retrieval arm (C2): retrieval-loss removed (agent handed current/superseded gold at read time). A remaining stale answer = pure revision/utilization failure. Base = lossy_compress."

model:
  provider: local_hf
  model_id: NousResearch/Meta-Llama-3.1-8B-Instruct
  max_new_tokens: 5000
  temperature: 0.0

memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300

# Four-way isolation arm: removes retrieval/crowding loss.
oracle_retrieval: true

seed: 42
