sut_id: gemma2_lossy_growing_local
description: "Gemma-2-27B-IT (local path) with growing history + lossy compaction (200-word budget). V4 validation run."

model:
  provider: local_hf
  model_id: google/gemma-2-27b-it
  max_new_tokens: 500
  torch_dtype: bfloat16

memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 200

seed: 42
