sut_id: gpt5_mini_growing
description: "GPT-5 mini, growing-history with lossy compaction (200-word budget)."
model:
  provider: litellm
  model: gpt-5-mini
  max_tokens: 4000
  temperature: 1.0
memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 200
seed: 42
