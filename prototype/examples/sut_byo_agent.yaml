# Example SUT YAML for a Bring-Your-Own Tier-2 agent.
#
# Companion to examples/byo_agent_minimal.py. Two ways to run with it:
#
#   1. Reference the class from this YAML (no flag needed):
#      agingbench run --scenario s7_research_notes \
#                     --sut examples/sut_byo_agent.yaml --card
#
#   2. Override the class via the CLI flag (YAML stays generic):
#      agingbench run --scenario s7_research_notes \
#                     --sut examples/sut_byo_agent.yaml \
#                     --adapter my_pkg.my_agent:MyAgent --card
#
# `model:` is required by the SUT loader's shape contract; for fully opaque
# agents (your agent talks to its own model provider) it is informational
# only — the AgentAdapter does not call litellm via this block.

sut_id: byo_agent_demo
description: "Demo: minimal AgentAdapter via type:custom — see examples/byo_agent_minimal.py"

model:
  provider: litellm
  model: claude-haiku-4-5
  max_tokens: 2048

adapter:
  type: custom
  # Importable module:ClassName on PYTHONPATH. Replace with your own.
  # Out of the box, this points at the runnable stub.
  class: byo_agent_minimal:MyAgent
  # Any further keys here are forwarded as kwargs to MyAgent(...).
  max_turns: 30
  # my_api_key_env: MY_API_KEY      # for example, your agent's secret env var

seed: 42
