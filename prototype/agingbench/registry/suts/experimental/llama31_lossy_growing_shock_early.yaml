sut_id: llama31_lossy_growing_shock_early
description: "Llama-3.1-8B with growing history + early maintenance shock at session 4"

model:
  provider: local_hf
  model_id: meta-llama/Llama-3.1-8B-Instruct
  max_new_tokens: 500

memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_shrinking.txt
  word_budget: 200

maintenance:
  shocks:
    - type: partial_reset
      session: 4
      ratio: 0.5

seed: 42
