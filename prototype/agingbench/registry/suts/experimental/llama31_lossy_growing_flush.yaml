sut_id: llama31_lossy_growing_flush
description: "Llama-3.1-8B with growing history + flush_history shock at session 4 (log rotation)"

model:
  provider: local_hf
  model_id: meta-llama/Llama-3.1-8B-Instruct
  max_new_tokens: 500

memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_shrinking.txt
  word_budget: 200

maintenance:
  shocks:
    - type: flush_history
      session: 4

seed: 42
