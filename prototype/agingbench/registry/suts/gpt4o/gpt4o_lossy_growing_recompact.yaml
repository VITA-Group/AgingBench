sut_id: gpt4o_lossy_growing_recompact
description: "GPT-4o growing_history + recompact shock at session 4 (checkpoint)"
model:
  provider: litellm
  model: gpt-4o
  max_tokens: 500
  temperature: 0.0
memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 200
maintenance:
  shocks:
    - type: recompact
      session: 4
seed: 42
