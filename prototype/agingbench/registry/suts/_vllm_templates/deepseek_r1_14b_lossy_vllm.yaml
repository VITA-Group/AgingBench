sut_id: deepseek_r1_14b_lossy_vllm
description: "DeepSeek-R1-Distill-Qwen-14B, lossy summarize_store — served by vLLM. deepseek_r1 reasoning parser."
model:
  provider: vllm
  model: deepseek-ai/DeepSeek-R1-Distill-Qwen-14B
  api_base: http://localhost:8000/v1
  max_tokens: 4000
  temperature: 0.0
memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300
seed: 42
# Launch:  vllm serve deepseek-ai/DeepSeek-R1-Distill-Qwen-14B --port 8000 \
#            --served-model-name deepseek-ai/DeepSeek-R1-Distill-Qwen-14B \
#            --enable-reasoning --reasoning-parser deepseek_r1
