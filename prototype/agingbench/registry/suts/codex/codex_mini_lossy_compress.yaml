sut_id: codex_mini_lossy_compress
description: "OpenAI codex-mini with growing history + lossy compaction (S1-S6 scenarios)."

model:
  provider: litellm
  model: codex-mini
  max_tokens: 500
  temperature: 0.0

memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 200

seed: 42
