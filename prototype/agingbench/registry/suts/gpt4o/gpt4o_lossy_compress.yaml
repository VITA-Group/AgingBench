sut_id: gpt4o_lossy_compress
description: "GPT-4o with lossy compaction — aggressive decay condition"

model:
  provider: litellm
  model: gpt-4o
  max_tokens: 5000
  temperature: 0.0

memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300

seed: 42
