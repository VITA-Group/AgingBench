sut_id: llama3_oracle_store
description: "Llama-3.1-8B oracle_store arm (C3): write-loss removed (lossless gold-bearing store), retrieval normal. Base = lossy_compress."

model:
  provider: local_hf
  model_id: NousResearch/Meta-Llama-3.1-8B-Instruct
  max_new_tokens: 5000
  temperature: 0.0

memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300

# Four-way isolation arm: removes compression/write-time loss.
oracle_store: true

seed: 42
