sut_id: llama3_lossy_compress
description: "Llama-3-8B-Instruct with lossy compaction — aggressive decay condition"

model:
  provider: local_hf
  model_id: NousResearch/Meta-Llama-3.1-8B-Instruct
  max_new_tokens: 5000
  temperature: 0.0

memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300

seed: 42
