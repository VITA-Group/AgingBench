sut_id: deepseek_r1_7b_lossy_vllm
description: "DeepSeek-R1-Distill-Qwen-7B, lossy summarize_store — served by vLLM. R1 always reasons; deepseek_r1 parser returns reasoning_content separately."
model:
  provider: vllm
  model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  api_base: http://localhost:8000/v1
  max_tokens: 4000          # R1 distills think long — keep this generous
  temperature: 0.0
memory_policy:
  type: summarize_store
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 300
seed: 42
# Launch:  vllm serve deepseek-ai/DeepSeek-R1-Distill-Qwen-7B --port 8000 \
#            --served-model-name deepseek-ai/DeepSeek-R1-Distill-Qwen-7B \
#            --enable-reasoning --reasoning-parser deepseek_r1
