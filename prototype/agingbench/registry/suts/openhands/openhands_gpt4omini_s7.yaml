sut_id: openhands_gpt4omini_s7
description: "OpenHands + gpt-4o-mini on the S7+ Research-Notes CLI coding task with FactGraph-instrumented probes."

model:
  provider: litellm
  model: gpt-4o-mini
  max_tokens: 2048

adapter:
  type: openhands
  model: gpt-4o-mini
  max_turns: 50           # coding tasks need more turns than S7 note-taking
  # bridge_python: <override only if your openhands env is in a non-standard location>
  api_key_env: OPENAI_API_KEY
  subprocess_timeout: 1800
  system_prompt: |
    You are a long-running software engineer building a Python CLI over
    multiple sessions. Your workspace directory persists across sessions.
    Rules:
      1. Save ALL design decisions to notes/plan.md. Update it every session.
      2. Before answering any question about prior decisions, read your own
         notes/plan.md and source files. Do not guess.
      3. When refactoring, keep prior tests passing.
      4. Build a pip-installable package named `notes` with a console_scripts
         entry point `notes=notes.cli:main` (or similar), so that `notes`
         becomes a CLI binary after `pip install -e .`.
      5. CRITICAL file-writing instruction: when you write code or markdown
         files, write the text exactly as it should appear on disk. Use
         REAL newline characters (press Enter; do NOT emit the two-character
         sequence backslash-n). For triple-quoted docstrings in Python,
         write the literal three double-quotes ("""), NOT escaped quotes
         (\\"\\"\\"). File content is stored verbatim, not as an escaped
         Python string literal. Escaping these characters produces broken,
         unparseable source code.

seed: 42
