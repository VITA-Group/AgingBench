sut_id: gemma3_lossy_growing_local
description: "Gemma-3-27B-IT with growing history + lossy compaction (200-word budget)."

model:
  provider: local_hf
  model_id: google/gemma-3-27b-it
  max_new_tokens: 500
  torch_dtype: bfloat16

memory_policy:
  type: growing_history
  compaction_prompt: experiments/prompts/compact_lossy.txt
  word_budget: 200

seed: 42
